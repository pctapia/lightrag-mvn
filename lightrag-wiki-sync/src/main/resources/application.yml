server:
  # Run on a different port so this service can coexist with the LightRAG demo (8080)
  port: 8090

spring:
  application:
    name: lightrag-wiki-sync

wiki:
  sync:
    # Set to "false" to disable all scheduled sync without stopping the application
    enabled: true

    # Cron expression for the scheduled sync job (Spring cron, 6 fields)
    # Default: daily at 02:00 server time
    schedule: "0 0 2 * * ?"

    # -------------------------------------------------------------------------
    # Wiki repository connection — override via environment variables in prod
    # -------------------------------------------------------------------------
    #
    # Option A — full URL (any git repository, no suffix appended):
    git-url: ${WIKI_GIT_URL:https://github.com/<user>/professional-programming.git}
    #
    # Option B — platform wiki convention (appends .wiki.git automatically).
    # Used when git-url is blank. Uncomment and set both:
    # remote-url: ${WIKI_REMOTE_URL:https://github.com/pctapia}
    # project-path: ${WIKI_PROJECT_PATH:professional-programming}

    # Personal access token with read scope. Pass via env var — never hardcode here.
    # Leave blank for public repositories (no token needed).
    access-token: ${WIKI_ACCESS_TOKEN:}

    # -------------------------------------------------------------------------
    # Local clone & LightRAG target
    # -------------------------------------------------------------------------
    local-clone-path: ${WIKI_CLONE_PATH:/tmp/lightrag-wiki-sync}
    lightrag-api-url: ${LIGHTRAG_API_URL:http://localhost:8080}
    workspace-id: ${LIGHTRAG_WORKSPACE_ID:professional-programming}

    # Set to true for the very first run to seed the workspace immediately on startup
    sync-on-startup: ${WIKI_SYNC_ON_STARTUP:true}

    # File extensions treated as wiki pages; all other files in the repo are ignored
    file-extensions:
      - .md
      - .adoc

logging:
  level:
    io.github.lightrag.wiki: INFO
    org.eclipse.jgit: WARN
